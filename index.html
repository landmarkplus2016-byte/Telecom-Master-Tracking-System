  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- ── Fonts ────────────────────────────────────────────── -->
  <!-- Barlow Condensed: headings, labels, badges             -->
  <!-- Barlow: body text, inputs, descriptions                -->
  <!-- JetBrains Mono: IDs, codes, data values, timestamps   -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- ── AG Grid Community Edition ───────────────────────── -->
  <!-- Pin version: bump here + in service-worker.js APP_SHELL if upgrading -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@33.0.0/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@33.0.0/styles/ag-theme-alpine.css">

  <!-- ── App CSS ───────────────────────────────────────────── -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/grid.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/filters.css">

  <!-- ── Service Worker — registered before any other script ──
       Must be first so the SW is active (and injecting COOP/COEP
       headers) as early as possible on subsequent page loads.
       DuckDB WASM requires SharedArrayBuffer, which in turn requires
       those headers.  On the very first visit the SW installs in the
       background; headers take effect from the second load onward.   -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(function (reg) {
          console.log('[SW] registered — scope:', reg.scope);

          // Show banner immediately if an update is already waiting
          // (e.g. user reloaded a tab that already detected the new SW)
          if (reg.waiting) { _showUpdateBanner(reg.waiting); }

          // Detect when a new SW finishes installing and enters "waiting"
          reg.addEventListener('updatefound', function () {
            var newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                _showUpdateBanner(newWorker);
              }
            });
          });
        })
        .catch(function (err) {
          console.warn('[SW] registration failed:', err);
        });

      // Reload when the new SW takes control so all files are fresh
      var _swReloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (_swReloading) return;
        _swReloading = true;
        console.log('[SW] controller changed — reloading for update');
        window.location.reload();
      });
    }

    // Show the update banner (#update-banner is in the HTML body).
    // Deferred via DOMContentLoaded so the element exists when we query it.
    function _showUpdateBanner(waitingWorker) {
      function _doShow() {
        var banner = document.getElementById('update-banner');
        var btn    = document.getElementById('update-banner-btn');
        if (!banner || !btn) return;
        banner.removeAttribute('hidden');
        btn.addEventListener('click', function () {
          waitingWorker.postMessage({ type: 'SKIP_WAITING' });
          btn.disabled    = true;
          btn.textContent = 'Updating…';
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', _doShow);
      } else {
        _doShow();
      }
    }
  </script>

  <!-- ── Theme: set data-theme before first paint (no FOUC) ── -->
  <script>(function(){var t=localStorage.getItem('app_theme');if(t&&t!=='navy')document.documentElement.setAttribute('data-theme',t);}());</script>

  <!-- ── Critical: Loading screen inline ──────────────────── -->
  <!-- Inlined so the loading screen renders before CSS loads -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─────────────────────────────────────────────────────
       Design system — light navy professional
       Carry these exact variables into all CSS files.
       ───────────────────────────────────────────────────── */
    :root {
      /* Backgrounds */
      --bg-base:        #f0f2f5;   /* page background — cool light grey */
      --bg-surface:     #ffffff;   /* cards, panels, modals */
      --bg-header:      #1a2e4a;   /* top header bar — navy */
      --bg-navy:        #1a2e4a;   /* primary navy */
      --bg-navy-deep:   #0f1e30;   /* deeper navy for hover/active */
      --bg-navy-mid:    #243d5c;   /* mid-navy for secondary elements */

      /* Borders */
      --border:         #d0d7e2;   /* standard divider on light bg */
      --border-navy:    #2a4060;   /* divider on navy surfaces */

      /* Accent — gold, used sparingly */
      --accent:         #c9973a;   /* warm gold — works on both navy + white */
      --accent-bright:  #e8b04a;   /* hover state / stronger hit */
      --accent-dim:     rgba(201, 151, 58, 0.15);

      /* Text */
      --text-primary:   #1a2e4a;   /* dark navy for body text on light bg */
      --text-secondary: #5a6a80;   /* muted on light bg */
      --text-on-navy:   #e8edf3;   /* primary text on navy surfaces */
      --text-muted-navy:#8fa5bf;   /* muted text on navy surfaces */

      /* Semantic */
      --color-lock:     #e8edf3;
      --color-conflict: #c8800a;
      --color-success:  #2a7a4a;
      --color-error:    #c0392b;

      /* Typography */
      --font-display:   'Barlow Condensed', sans-serif;
      --font-body:      'Barlow', sans-serif;
      --font-mono:      'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── Loading screen ─────────────────────────────────── */
    #screen-loading {
      position: fixed;
      inset: 0;
      /* Navy background with a subtle dot-grid texture */
      background-color: var(--bg-navy);
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-frame {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 40px 56px 36px;
      /* White card floated on the navy background */
      background: var(--bg-surface);
      border: 1px solid var(--border);
      overflow: hidden;
      /* Subtle drop shadow for depth on the navy field */
      box-shadow: 0 8px 40px rgba(10, 20, 35, 0.35);
    }

    /* Gold corner accents */
    .loading-frame::before,
    .loading-frame::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .loading-frame::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .loading-frame::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* Scanning beam — navy-tinted, sweeps across the white card */
    .scan-beam {
      position: absolute;
      top: 0;
      left: 0;
      width: 60px;
      height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(26, 46, 74, 0.04) 40%,
        rgba(26, 46, 74, 0.10) 50%,
        rgba(26, 46, 74, 0.04) 60%,
        transparent 100%);
      animation: scan 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(calc(100vw + 100%)); }
    }

    .loading-eyebrow {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.85;
    }

    .loading-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 42px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bg-navy);
      line-height: 1;
    }

    .loading-subtitle {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* Gold rule between title and status */
    .loading-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 14px 0 10px;
      opacity: 0.6;
    }

    .loading-status {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Pulsing gold dot */
    .loading-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* Animated ellipsis for status text */
    .loading-ellipsis span {
      animation: blink-char 1.4s step-start infinite;
    }
    .loading-ellipsis span:nth-child(2) { animation-delay: 0.2s; }
    .loading-ellipsis span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink-char {
      0%, 60%, 100% { opacity: 1; }
      30%            { opacity: 0; }
    }

    /* ── Utility: hide/show screens ─────────────────────── */
    [hidden] { display: none !important; }

    /* ══════════════════════════════════════════════════════
       THEME OVERRIDES
       Each block overrides only the variables that differ
       from the :root defaults above. The selector
       html[data-theme="xxx"] has higher specificity than
       :root so it always wins without !important.
       ══════════════════════════════════════════════════════ */

    /* ── Blue (#4472C4) ──────────────────────────────────── */
    html[data-theme="blue"] {
      --bg-navy:          #295097;
      --bg-navy-deep:     #152d57;
      --bg-navy-mid:      #2d5299;
      --bg-header:        #295097;
      --border-navy:      #2d4a80;
      --accent:           #4472c4;
      --accent-bright:    #5a8fd8;
      --accent-dim:       rgba(68, 114, 196, 0.15);
      --hover-row:        rgba(33, 197, 255, 0.18);
      --bg-base:          #f0f4fa;
      --bg-zebra:         #e8eef8;
      --bg-zebra-readonly:#e0eaf5;
      --text-primary:     #1e3a6e;
      --text-secondary:   #4a5a78;
      --text-on-navy:     #e8f0ff;
      --text-muted-navy:  #9ab0d8;
    }

    /* ── Dark Mode ───────────────────────────────────────── */
    html[data-theme="dark"] {
      --bg-base:          #0d1117;
      --bg-surface:       #514d4d;
      --bg-header:        #21262d;
      --bg-navy:          #21262d;
      --bg-navy-deep:     #161b22;
      --bg-navy-mid:      #30363d;
      --border:           #30363d;
      --border-navy:      #444c56;
      --accent:           #c9973a;
      --accent-bright:    #e8b04a;
      --accent-dim:       rgba(201, 151, 58, 0.18);
      --bg-zebra:         #383838;
      --bg-zebra-readonly:#161f2c;
      --text-primary:     #e6edf3;
      --text-secondary:   #8b949e;
      --text-on-navy:     #e6edf3;
      --text-muted-navy:  #8b949e;
      --color-success:    #3fb950;
      --color-error:      #f85149;
    }

    /* ── Green ───────────────────────────────────────────── */
    html[data-theme="green"] {
      --bg-navy:          #28563f;
      --bg-navy-deep:     #0f2a1c;
      --bg-navy-mid:      #2a4d38;
      --bg-header:        #28563f;
      --border-navy:      #2d5040;
      --accent:           #4a9e6a;
      --accent-bright:    #5dba80;
      --accent-dim:       rgba(74, 158, 106, 0.15);
      --hover-row:        rgba(95, 242, 84, 0.18);
      --bg-base:          #f0f5f2;
      --bg-zebra:         #e5f0e8;
      --bg-zebra-readonly:#ddeae0;
      --text-primary:     #1a3a2a;
      --text-secondary:   #3a5a48;
      --text-on-navy:     #e0f0e8;
      --text-muted-navy:  #8ab8a0;
    }

    /* ── Purple / Pink ───────────────────────────────────── */
    html[data-theme="purple"] {
      --bg-navy:          #462a78;
      --bg-navy-deep:     #1e1035;
      --bg-navy-mid:      #3d2666;
      --bg-header:        #462a78;
      --border-navy:      #4a3070;
      --accent:           #9b59d0;
      --accent-bright:    #b47ee8;
      --accent-dim:       rgba(155, 89, 208, 0.15);
      --hover-row:        rgba(251, 143, 236, 0.18);
      --bg-base:          #f5f2fa;
      --bg-zebra:         #ede8f8;
      --bg-zebra-readonly:#e5def5;
      --border:           #e2d8f0;
      --text-primary:     #2d1b4e;
      --text-secondary:   #6b5a85;
      --text-on-navy:     #ede8f8;
      --text-muted-navy:  #a98fd4;
    }

  </style>
</head>

<body>

<!-- ════════════════════════════════════════════════════════ -->
<!-- SCREEN: Loading                                          -->
<!-- Shown immediately on app open. app.js hides it once     -->
<!-- auth state is determined and the app is ready.          -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-loading">
  <div class="loading-frame">
    <div class="scan-beam"></div>
    <span class="loading-eyebrow">Telecom Department</span>
    <h1 class="loading-title">Tracking System</h1>
    <p class="loading-subtitle">Coordinator Workspace</p>
    <div class="loading-rule"></div>
    <div class="loading-status">
      <span class="loading-dot"></span>
      <span id="loading-status-text">Initializing<span class="loading-ellipsis"><span>.</span><span>.</span><span>.</span></span></span>
    </div>
  </div>
</div>


<!-- ════════════════════════════════════════════════════════ -->
<!-- SCREEN: First-launch Setup                              -->
<!-- config.js shows this when no Apps Script URL is stored. -->
<!-- User pastes their deployed Web App URL here.            -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-setup" hidden>
  <!-- Populated by js/config.js -->
</div>


<!-- ════════════════════════════════════════════════════════ -->
<!-- SCREEN: Login                                           -->
<!-- auth.js shows this after setup is complete.             -->
<!-- Contains: name dropdown + personal code field.          -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-login" hidden>
  <!-- Populated by js/auth.js -->
</div>


<!-- ════════════════════════════════════════════════════════ -->
<!-- SCREEN: Main Application                                -->
<!-- app.js shows this after successful authentication.      -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-app" hidden>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header id="app-header">

    <!-- Logo + role badge -->
    <div id="app-logo">
      <!-- js/auth.js injects: app wordmark + role badge -->
    </div>

    <!-- Global search bar (js/filters.js) -->
    <div id="global-search-wrap">
      <!-- js/filters.js injects the search input -->
    </div>

    <!-- Toolbar: action buttons (role-gated by js/app.js) -->
    <div id="toolbar-actions">
      <!-- Buttons injected by js/app.js after role is known:  -->
      <!--   [Filter]  [Export]  [Backup Now]                  -->
      <!--   [Reconcile] — invoicing + manager only            -->
      <!--   [⚙ Manager] — manager only                        -->
    </div>

    <!-- Presence avatars (js/sheets.js — Stage 3) -->
    <div id="presence-bar">
      <!-- Avatar bubbles injected by js/sheets.js -->
    </div>

  </header><!-- /#app-header -->


  <!-- ── Body ───────────────────────────────────────────── -->
  <div id="app-body">

    <!-- Filter panel (js/filters.js — Stage 4)             -->
    <!-- Always-visible ribbon; content injected by filters.js -->
    <aside id="filter-panel">
      <!-- Populated immediately by Filters.init() in js/filters.js -->
    </aside>

    <!-- AG Grid mount point (js/grid.js) -->
    <div id="grid-container">
      <!-- ag-theme-alpine class + grid instance attached by Grid.init() -->
    </div>

  </div><!-- /#app-body -->


  <!-- ── Status bar ─────────────────────────────────────── -->
  <footer id="app-statusbar">

    <!-- Sync / offline indicator (js/offline.js) -->
    <div id="sync-indicator">
      <!-- js/offline.js injects sync state:                 -->
      <!--   ● N changes pending sync                        -->
      <!--   ✓ All synced  (disappears after 3s)             -->
    </div>

    <!-- Cold-start / connecting indicator (js/sheets.js) -->
    <div id="cold-start-indicator" hidden>
      <!-- js/sheets.js shows "Waking up..." on first cold call -->
    </div>

    <!-- Last sync timestamp -->
    <div id="last-sync-time">
      <!-- js/sheets.js updates this after every successful sync -->
    </div>

    <!-- Row count for current view -->
    <div id="row-count">
      <!-- js/grid.js updates this when filter/data changes -->
    </div>

  </footer><!-- /#app-statusbar -->

</div><!-- /#screen-app -->


<!-- ════════════════════════════════════════════════════════ -->
<!-- MODALS & OVERLAYS (shared, all screens)                  -->
<!-- ════════════════════════════════════════════════════════ -->

<!-- Backdrop (js/app.js manages open/close) -->
<div id="modal-overlay" hidden aria-hidden="true"></div>

<!-- Generic modal container                                  -->
<!-- Each feature injects its own content here:              -->
<!--   js/delete.js   → delete confirm + Clear All Data      -->
<!--   js/grid.js     → row-lock message                     -->
<!--   js/reconcile.js→ TSR reconciliation panel             -->
<!--   js/offline.js  → conflict resolution panel            -->
<!--   js/export.js   → export options                       -->
<div id="modal-container" hidden role="dialog" aria-modal="true">
  <!-- Content injected dynamically by feature modules -->
</div>


<!-- ════════════════════════════════════════════════════════ -->
<!-- PWA UPDATE BANNER (service-worker.js)                   -->
<!-- Shown when a new version is ready to install.           -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="update-banner" hidden>
  <span id="update-banner-text">A new update is available</span>
  <button id="update-banner-btn" type="button">Update Now</button>
</div>


<!-- ════════════════════════════════════════════════════════ -->
<!-- SCRIPTS                                                  -->
<!-- Load order matters:                                      -->
<!--   1. AG Grid Community (global agGrid dependency)       -->
<!--   2. DuckDB WASM (global duckdb — must precede db.js)   -->
<!--   3. Static data (dropdowns fallback)                   -->
<!--   4. Infrastructure modules (config → auth → sheets)    -->
<!--   5. Business logic (db → offline → id → pricing → grid)-->
<!--   6. UI features (filters → delete → export → reconcile)-->
<!--   7. Background services (backup)                       -->
<!--   8. app.js last — wires everything together            -->
<!-- ════════════════════════════════════════════════════════ -->

<!-- AG Grid Community Edition (exposes global `agGrid`) -->
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@33.0.0/dist/ag-grid-community.min.js"></script>

<!-- DuckDB WASM — browser bundle (exposes global `duckdb` with getJsDelivrBundles / selectBundle).
     Must load before js/db.js.  Session 1 of BUILD_GUIDE_V2.
     Pin version: bump here + in service-worker.js APP_SHELL if upgrading. -->
<script src="https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-browser.js"></script>

<!-- xlsx-js-style: SheetJS fork with full cell styling support -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<!-- Fallback dropdown data (must load before auth/grid) -->
<script src="data/dropdowns.js"></script>

<!-- Infrastructure -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/sheets.js"></script>

<!-- DuckDB local database layer (replaces offline.js in a later session) -->
<script src="js/db.js"></script>

<!-- Business logic -->
<script src="js/offline.js"></script>
<script src="js/id.js"></script>
<script src="js/pricing.js"></script>
<script src="js/grid.js"></script>

<!-- UI features -->
<script src="js/filters.js"></script>
<script src="js/delete.js"></script>
<script src="js/export.js"></script>
<script src="js/reconcile.js"></script>

<!-- Background services -->
<script src="js/backup.js"></script>

<!-- Theme selector (before app.js so Theme is available in _renderHeader) -->
<script src="js/theme.js"></script>

<!-- App init — must be last -->
<script src="js/app.js"></script>

<!-- Service Worker registration moved to <head> (first script on the page).
     COOP/COEP header injection and update banner are handled there. -->

</body>
</html>
